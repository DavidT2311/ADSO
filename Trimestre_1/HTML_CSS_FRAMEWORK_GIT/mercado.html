<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap-5.3.3-dist/css/bootstrap.min.css">
    <title>Tablas</title>
</head>
<body>
    
    <table class="table table-striped">
        <thead class="table-dark">
            <tr>
                <th class="px-3" scope="col">Nombre</th>
                <th class="px-3" scope="col">Cantidad</th>
                <th class="px-3" scope="col">Valor</th>
                <th class="px-3" scope="col">Descripion</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="px-3">Arroz</td>
                <td class="px-3">7</td>
                <td class="px-3">2000</td>
                <td class="px-3">Arroz premium</td>
            </tr>
            <tr>
                <td class="px-3">Aceite</td>
                <td class="px-3">2</td>
                <td class="px-3">6500</td>
                <td class="px-3">Aceite premium</td>
            </tr>                 
        </tbody>
    </table>

    <table class="tab">
            <tr>
                <th class="thd">Nombre</th>
                <th class="thd">Cantidad</th>
                <th class="thd">Valor</th>
                <th class="thd">Descripion</th>
            </tr>
            <tr>
                <th class="thd">Arroz</th>
                <th class="thd">7</th>
                <th class="thd">2000</th>
                <th class="thd">Arroz premium</th>
            </tr>
            <tr>
                <th class="thd">Aceite</th>
                <th class="thd">2</th>
                <th class="thd">6500</th>
                <th class="thd">Aceite premium</th>
            </tr>                 
    </table>

    <style>
        .tab, .thd {
            border: 2px solid rgb(33, 185, 33);
            border-radius: 8px;
        }

    </style>

</body>
</html>
