<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="Styles/bootstrap-5.3.3-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="Styles/Styles.css">
    <link rel="shortcut icon" href="Images/Sena.png" />
    <title>Expectativas</title>
</head>

<body>
    <div class="container text-center mt-5">
        <form action="Consentimiento.html" id="expectativas">
            <div class="row justify-content-start offset-md-3 pt-4 bg-dark-subtle w-50 shadow-lg">
                <h2 class="col-md-6 offset-md-3 mx-auto mb-4 fw-bold border border-success border-3 bg-success-subtle w-75">
                    Expectativas
                </h2>
                <nav>
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item">
                            <a href="index.html" class="text-success link-underline link-underline-opacity-0">Informacion personal</a>
                        </li>
                        <li class="breadcrumb-item">
                            <a href="Experiencia_Educacion.html" class="text-success link-underline link-underline-opacity-0">Experiencia y educacion</a>
                        </li>
                        <li class="breadcrumb-item">
                            <a href="Habilidades_Tecnicas.html" class="text-success link-underline link-underline-opacity-0">Habilidades tecnicas</a>
                        </li>
                        <li class="breadcrumb-item">
                            <a href="Disponibilidad.html" class="text-success link-underline link-underline-opacity-0">Disponibilidad</a>
                        </li>
                        <li class="breadcrumb-item active text-success-emphasis">Expectativas</li>
                    </ol>
                </nav>

                <div class="input-group">
                    <span class="input-group-text px-2 dollar ms-4">$</span>
                    <div class="form-floating col-md-11 offset-md-3 me-4 text-center">
                        <input type="number" class="form-control mb-3 shadow" id="salario" placeholder="" required/>
                        <label for="salario" class="px-4">Expectativas salariales</label>
                    </div>
                </div>
                <div class="form-floating col-md-11 offset-md-3 mx-4 text-center">
                    <input type="text" class="form-control mb-3 shadow" id="roles" placeholder="" required/>
                    <label for="roles" class="px-4">Expectativas de roles y responsabilidades en el proyecto</label>
                </div>
                <div class="form-floating col-md-11 offset-md-3 mx-4 text-center">
                    <textarea class="form-control mb-3 shadow" placeholder="" cols="30" rows="10" style="height: 100px;" id="comentario_adicional"></textarea>
                    <label for="comentario_adicional" class="px-4">Cualquier comentario adicional relevante para la solicitud</label>
                </div>

                <button class="col-md-6 offset-md-3 btn btn-success btn-lg mt-5 mb-4 shadow" id="btnexpectativas">Sigiente</button>
            </div>
        </form>
    </div>

    <script src="Styles/bootstrap-5.3.3-dist/js/bootstrap.min.js"></script>
    <script src="Scripts/scripts.js"></script>
</body>

</html>
